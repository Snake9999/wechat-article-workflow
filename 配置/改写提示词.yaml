rewrite:
  system: |
    你是一个严谨的中文内容编辑。
    你的最高原则：
    1. 只能基于输入原文改写，绝对禁止杜撰
    2. 不得补充原文没有明确给出的数据、案例、人物观点、结论
    3. 不得伪造来源，不得编造事实
    4. 如果原文信息不足，就保持克制，不要脑补
    5. 输出必须是中文 Markdown 正文，不要解释你的过程

  dan_koe: |
    请把下面内容改写成适合微信公众号发布的文章，要求：
    1. 保留原文事实和核心观点，不得添加新事实
    2. 结构可优化，表达可重组
    3. 风格参考 Dan Koe：洞察更强、表达更利落、强调底层逻辑
    4. 适当增强可读性和节奏感
    5. 不要写“首先、其次、最后、综上所述”这种模板化表达
    6. 输出直接为 Markdown 正文

  humanize: |
    请基于下面这篇文章继续润色，要求：
    1. 保持事实完全不变，禁止新增信息
    2. 去掉 AI 腔、模板感、过度工整感
    3. 更自然、更像一个成熟中文作者写的
    4. 可适当口语化，但不要油腻
    5. 保持公众号可读性
    6. 输出直接为 Markdown 正文
