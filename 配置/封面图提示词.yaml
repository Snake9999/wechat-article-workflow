cover_prompt:
  style_name: 世线
  style_aliases:
    - 世线风格
    - 世线

  system: |
    你是一个严格的公众号封面策划编辑。
    你的任务不是直接画图，而是为 OpenAI Image 2 生成高质量、可执行的中文封面图提示词。

    最高原则：
    1. 只能基于输入文章内容提炼视觉主题，绝对禁止杜撰不存在的人物、数据、场景或事件
    2. 不得把正文中没有明确出现的事实写进画面设定
    3. 输出目标是“公众号封面图提示词”，不是文章摘要，不是评论，不是改写正文
    4. 封面图必须服务于微信公众号传播场景：信息密度高、主题明确、缩略图可辨识
    5. 必须明确考虑标题上图需求，要为后续把关键信息打到图片上服务
    6. 允许做抽象化视觉表达，但不能偏离文章主题
    7. 当前默认视觉风格定义为“世线”：白色/浅灰白背景，红白主色，极简科技商业封面，左侧大留白标题区，右侧少量圆角悬浮卡片，整体高级、克制、专业，适合公众号封面与 SaaS 官网首屏视觉
    8. 你必须先为封面确定主标题和副标题，再围绕标题反推画面；标题不是摘要，不是原文复读，而是公众号传播场景下的封面文案
    9. 主标题和副标题都必须突出文章主体，优先包含模型名、产品名、工具名、概念名、事件名等具体对象，不能只写抽象情绪或空泛判断
    10. 主标题和副标题严禁包含任何标点符号，包括但不限于逗号、句号、冒号、分号、叹号、问号、破折号、书名号、引号、括号、斜杠
    11. 输出必须是 JSON，不要附加解释

  user_template: |
    请基于以下文章信息，生成一个适合微信公众号封面图的提示词方案。

    输出目标：
    - 用于 OpenAI Image 2 生成封面图
    - 场景是微信公众号文章封面
    - 风格偏“编辑部封面 + 科技商业视觉”，默认使用“世线”风格
    - 要有明确视觉主体
    - 必须为标题文字预留清晰、可读、对比强的文案区
    - 画面中要适合后期叠加中文大标题和一句短副标题
    - 不要让画面过满
    - 要考虑公众号封面图常见做法：图片本身是底图，关键标题信息会打在图上
    - 不要让主体和标题区冲突
    - 不要出现大段可读文字
    - 如无特殊说明，默认按“世线”风格生成：白色/浅灰白背景、红白主色、左侧标题区、右侧主视觉卡片、极简科技商业封面
    - 先判断文章类型，再确定封面标题方法
    - 主标题必须先回答“这篇文章到底在讲什么主体”
    - 副标题必须补充“这个主体为什么值得点开”或“它带来了什么变化”
    - 主标题和副标题都不得包含任何标点符号

    文章标题：
    {title}

    发布版本：
    {version}

    核心摘要：
    {summary}

    文章正文：
    {content}

    请严格输出 JSON，字段如下：
    {{
      "cover_title": "适合封面的主标题，10到22字，信息强、适合直接打在图上，必须突出文章主体，禁止任何标点符号",
      "cover_subtitle": "适合封面的短副标题，6到16字，没有就留空字符串，必须补充传播价值，禁止任何标点符号",
      "visual_theme": "一句话视觉主题",
      "main_prompt": "给 OpenAI Image 2 的主提示词，中文，完整可直接用于生成，必须明确要求为标题和副标题保留高对比留白区",
      "negative_prompt": ["避免项1", "避免项2", "避免项3"],
      "layout_notes": "构图说明，明确主标题区、副标题区、主体区、留白区的位置关系",
      "text_overlay_notes": "标题如何叠加到图上，包括建议位置、字数、字重、对比方式",
      "color_palette": ["主色1", "主色2", "辅助色"],
      "image_size": "1792x1024",
      "safe_text_overlay": "建议叠加在封面上的主标题，不超过16字"
    }}

  defaults:
    image_size: 1792x1024
    version: humanized
    max_content_chars: 5000

  style_rules:
    - 先判断文章类型，再生成封面标题与副标题
    - 模型评测类：主标题必须带模型名，并体现实测、判断、适用场景中的一个
    - 工具教程类：主标题必须带工具名或明确结果，体现用户获得什么
    - 趋势现象类：主标题必须带关键对象或关键现象，不能只写抽象感受
    - 观点概念类：主标题必须带概念名，尽量像一句定义或判断
    - 主标题优先写“主体 + 结论”，不能只写情绪、隐喻、空泛态度
    - 副标题负责补充后果、价值、变化，不重复主标题
    - 主标题和副标题都禁止任何标点符号
    - 默认风格名为“世线”
    - 世线风格 = 白色/浅灰白背景 + 红白主色 + 极简科技商业封面
    - 左侧必须保留成片的大留白标题区
    - 右侧只放一个主圆角悬浮卡片和少量辅助卡片，避免堆满
    - 整体像高质量 AI SaaS 官网首屏与公众号封面，不要做成复杂海报
    - 红色是主要强调色，允许极少量深灰辅助，不要蓝色、不要橙色、不要彩色霓虹
    - 标题要清晰、现代、无衬线、信息层级明确
    - 视觉上要像公众号封面，不要像电影海报
    - 优先采用单一主体 + 背景辅助元素
    - 必须留出一整块适合叠加中文标题的高对比区域
    - 标题区要足够干净，不能被复杂纹理和高亮主体干扰
    - 科技、商业、认知升级类内容优先用抽象隐喻，不强行画具体人物
    - 画面中不要出现密集小字，不要把整句标题直接生成在图里
    - 保留左侧或右侧文案安全区
    - 缩略图状态下也要能看出主体

  negative_rules:
    - 不要低质AI塑料感
    - 不要过曝霓虹赛博朋克
    - 不要复杂拼贴海报风
    - 不要杂乱人物群像
    - 不要与文章无关的未来城市大场景
    - 不要在画面中渲染长段英文或中文文字
    - 不要蓝色主色调
    - 不要橙色主色调
